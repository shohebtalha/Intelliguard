# ─── Application ───────────────────────────────────────────
spring.application.name=intelliguard
server.port=8080
spring.profiles.active=local

# ─── PostgreSQL Database ────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/IntelliGuard
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
# create-drop: creates tables on startup, drops on shutdown (good for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Actuator (health checks) ───────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

#─── Logging ────────────────────────────────────────────────
logging.level.com.intelliguard=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Redis ──────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms