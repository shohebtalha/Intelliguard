# ─── Application ───────────────────────────────────────────
spring.application.name=intelliguard
server.port=8080

# ─── PostgreSQL Database ────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/intelliguard
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
# create-drop: creates tables on startup, drops on shutdown (good for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Actuator (health checks) ───────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Logging ────────────────────────────────────────────────
logging.level.com.intelliguard=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n